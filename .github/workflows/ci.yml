name: Watermelon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to app folder
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/app-debug.apk

      - name: Commit and push debug APK (main branch pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash push --include-untracked -m "auto-stash" || true
          git pull --rebase origin main || true
          git stash pop || true
          git add app/app-debug.apk
          if ! git diff --staged --quiet; then
            git commit -m "Auto-commit debug APK [skip ci]"
            git push
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-debug
          path: app/app-debug.apk
          retention-days: 30

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Copy release APK to app folder
        run: cp app/build/outputs/apk/release/app-release.apk app/app-release.apk

      - name: Commit and push release APK (main branch pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash push --include-untracked -m "auto-stash" || true
          git pull --rebase origin main || true
          git stash pop || true
          git add app/app-release.apk
          if ! git diff --staged --quiet; then
            git commit -m "Auto-commit release APK [skip ci]"
            git push
          fi

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-release
          path: app/app-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/app-debug.apk
            app/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
