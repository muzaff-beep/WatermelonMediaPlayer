name: Watermelon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 platforms;android-34 build-tools;35.0.0 build-tools;34.0.0 ndk;27.3.13750724'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Locate Android NDK
        id: ndk
        run: |
          NDK_PATH=$(ls -d $ANDROID_HOME/ndk/* 2>/dev/null | sort -V | tail -1)
          echo "Found NDK at: $NDK_PATH"
          echo "ndk_path=$NDK_PATH" >> $GITHUB_OUTPUT

      - name: Build Rust core for Android
        working-directory: rust-core
        run: |
          export ANDROID_NDK_HOME="${{ steps.ndk.outputs.ndk_path }}"
          cargo ndk -t arm64-v8a -t armeabi-v7a -o ../app/src/main/jniLibs build --release -p watermelon-core

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to Pubs/ folder
        run: |
          mkdir -p Pubs
          cp app/build/outputs/apk/debug/app-debug.apk Pubs/wmp.apk

      - name: Attempt to commit and push APK (non‑fatal if write permission missing)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash push --include-untracked -m "auto-stash" || true
          git pull --rebase origin main || true
          git stash pop || true

          git add Pubs/wmp.apk
          if ! git diff --staged --quiet; then
            git commit -m "Auto-commit debug APK [skip ci]"
            git push || echo "WARNING: git push failed (permission denied). APK available as artifact."
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-debug
          path: Pubs/wmp.apk

      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ "$KEYSTORE_BASE64" != "" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            export KEYSTORE_PATH="$(pwd)/keystore.jks"
            ./gradlew assembleRelease
            mkdir -p Pubs
            cp app/build/outputs/apk/release/app-release.apk Pubs/wmp-release.apk
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "No keystore secrets configured. Skipping release APK build."
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Upload release APK artifact
        if: env.KEYSTORE_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wmp-release
          path: Pubs/wmp-release.apk

      - name: Create GitHub Release and upload APKs (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Pubs/wmp.apk
            Pubs/wmp-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}