name: Watermelon CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
- name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
- name: Setup Android SDK
        uses: android-actions/setup-android@v3
- name: Install Android SDK components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.2.12479018"
- name: Grant execute permission for gradlew
        run: chmod +x gradlew
- name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
- name: Install cargo-ndk
        run: cargo install cargo-ndk
- name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
- name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-core/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-rust-
- name: Build Rust core for Android
        working-directory: rust-core
        run: |
          export ANDROID_NDK_HOME="$ANDROID_HOME/ndk/27.2.12479018"
          cargo ndk \
            -t arm64-v8a \
            -t armeabi-v7a \
            -o ../app/src/main/jniLibs \
            build --release -p watermelon-core
- name: Build debug APK
        run: ./gradlew assembleDebug
- name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
- name: Build and sign release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            export KEYSTORE_PATH="$(pwd)/keystore.jks"
            ./gradlew assembleRelease
            echo "RELEASE_BUILT=true" >> $GITHUB_ENV
          else
            echo "No keystore configured. Skipping release build."
            echo "RELEASE_BUILT=false" >> $GITHUB_ENV
          fi
- name: Upload release APK artifact
        if: env.RELEASE_BUILT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wmp-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
- name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
