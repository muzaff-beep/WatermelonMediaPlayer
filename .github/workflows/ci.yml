name: Watermelon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to Pubs/ folder
        run: |
          mkdir -p Pubs
          cp app/build/outputs/apk/debug/app-debug.apk Pubs/wmp.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-debug
          path: Pubs/wmp.apk
          retention-days: 30

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Copy release APK to Pubs/ folder
        run: cp app/build/outputs/apk/release/app-release.apk Pubs/wmp-release.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wmp-release
          path: Pubs/wmp-release.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Pubs/wmp.apk
            Pubs/wmp-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
