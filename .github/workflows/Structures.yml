name: Generate Project Structure

on:
  workflow_dispatch:        # Manual trigger
  push:
    branches: [ "scaffold" ]  # Optional: auto-run on a scaffold branch

jobs:
  scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create full project structure
        run: |
          # Exit on any error
          set -e

          # ============================================================
          # ROOT CONFIG FILES
          # ============================================================
          touch .gitignore .editorconfig build.gradle.kts settings.gradle.kts gradle.properties
          touch local.properties README.md LICENSE

          # ============================================================
          # GRADLE WRAPPER
          # ============================================================
          mkdir -p gradle/wrapper
          touch gradle/wrapper/gradle-wrapper.jar
          touch gradle/wrapper/gradle-wrapper.properties

          # ============================================================
          # CI PIPELINE
          # ============================================================
          mkdir -p .github/workflows
          touch .github/workflows/ci.yml

          # ============================================================
          # TEAM 1: RUST MEDIA ENGINE — rust-core/
          # ============================================================
          mkdir -p rust-core/src
          mkdir -p rust-core/.cargo
          mkdir -p rust-core/tests/common
          mkdir -p rust-core/test-data/sample.hls
          mkdir -p rust-core/scripts

          touch rust-core/Cargo.toml
          touch rust-core/build.rs
          touch rust-core/.cargo/config.toml
          touch rust-core/src/lib.rs
          touch rust-core/src/engine.rs
          touch rust-core/src/decoder.rs
          touch rust-core/src/audio.rs
          touch rust-core/src/subtitle.rs
          touch rust-core/src/plugin_host.rs
          touch rust-core/src/playlist_parser.rs
          touch rust-core/src/jni_bridge.rs
          touch rust-core/src/callback.rs
          touch rust-core/src/error.rs
          touch rust-core/src/demuxer.rs
          touch rust-core/src/renderer.rs
          touch rust-core/src/network_stream.rs
          touch rust-core/src/crypto.rs
          touch rust-core/src/utils.rs
          touch rust-core/src/types.rs
          touch rust-core/tests/engine_test.rs
          touch rust-core/tests/decoder_test.rs
          touch rust-core/tests/subtitle_test.rs
          touch rust-core/tests/playlist_parser_test.rs
          touch rust-core/tests/plugin_host_test.rs
          touch rust-core/tests/jni_bridge_test.rs
          touch rust-core/tests/integration_test.rs
          touch rust-core/tests/network_stream_test.rs
          touch rust-core/tests/common/mod.rs
          touch rust-core/tests/common/test_utils.rs
          touch rust-core/test-data/sample.srt
          touch rust-core/test-data/sample.ass
          touch rust-core/test-data/sample.m3u
          touch rust-core/test-data/sample.pls
          touch rust-core/test-data/sample.hls/master.m3u8
          touch rust-core/test-data/sample.hls/segment_0.ts
          touch rust-core/scripts/build-android.sh
          touch rust-core/scripts/run-desktop-tests.sh

          # ============================================================
          # TEAM 1: CODEC PLUGIN TRAIT — codec-plugin/
          # ============================================================
          mkdir -p codec-plugin/src
          touch codec-plugin/Cargo.toml
          touch codec-plugin/src/lib.rs

          # ============================================================
          # TEAM 1: SAMPLE CODEC PLUGIN — sample-codec-plugin/
          # ============================================================
          mkdir -p sample-codec-plugin/src
          touch sample-codec-plugin/Cargo.toml
          touch sample-codec-plugin/src/lib.rs

          # ============================================================
          # APP MODULE — app/
          # ============================================================
          touch app/build.gradle.kts
          touch app/proguard-rules.pro

          # --- JNI libs placeholder (built artifacts) ---
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          # Keep as empty dirs — .so files are build artifacts, not placeholders

          # --- AndroidManifest (if not already present) ---
          touch app/src/main/AndroidManifest.xml

          # ============================================================
          # KOTLIN SOURCE TREE — app/src/main/kotlin/com/watermelon/player/
          # ============================================================
          PKG="app/src/main/kotlin/com/watermelon/player"
          mkdir -p "$PKG"

          # App-level files
          touch "$PKG/WatermelonApp.kt"
          touch "$PKG/MainActivity.kt"

          # Config
          touch "$PKG/config/RegionalConfig.kt"
          touch "$PKG/config/BuildConfigFlags.kt"

          # DI
          touch "$PKG/di/AppModule.kt"
          touch "$PKG/di/ViewModelModule.kt"

          # TEAM 2: Rust JNI Bridge
          touch "$PKG/rust/WatermelonCore.kt"
          touch "$PKG/rust/NativeLibLoader.kt"
          touch "$PKG/rust/JniExceptionHandler.kt"

          # TEAM 2: Platform Integration
          touch "$PKG/platform/SurfaceProvider.kt"
          touch "$PKG/platform/NetworkSocketProvider.kt"
          touch "$PKG/platform/AudioFocusManager.kt"
          touch "$PKG/platform/ThermalMonitor.kt"
          touch "$PKG/platform/WakeLockManager.kt"
          touch "$PKG/platform/HeadphoneStateMonitor.kt"

          # TEAM 2: Callback Adapters
          touch "$PKG/callback/CoreEventAdapter.kt"
          touch "$PKG/callback/EventDispatcher.kt"

          # TEAM 3: Room Entities
          touch "$PKG/database/entity/VideoEntity.kt"
          touch "$PKG/database/entity/FolderEntity.kt"
          touch "$PKG/database/entity/PlaylistEntity.kt"
          touch "$PKG/database/entity/PlaylistEntryEntity.kt"
          touch "$PKG/database/entity/ResumePointEntity.kt"

          # TEAM 3: DAOs
          touch "$PKG/database/dao/VideoDao.kt"
          touch "$PKG/database/dao/FolderDao.kt"
          touch "$PKG/database/dao/PlaylistDao.kt"
          touch "$PKG/database/dao/ResumePointDao.kt"

          # TEAM 3: Converters
          touch "$PKG/database/converter/Converters.kt"

          # TEAM 3: Database class
          touch "$PKG/database/MediaDatabase.kt"

          # TEAM 3: Scanner
          touch "$PKG/scan/VideoScanner.kt"
          touch "$PKG/scan/VideoScannerWorker.kt"
          touch "$PKG/scan/ScanResult.kt"
          touch "$PKG/scan/ScanScheduler.kt"

          # TEAM 3: Storage
          touch "$PKG/storage/UnifiedStorageAccess.kt"
          touch "$PKG/storage/StoragePermissionManager.kt"
          touch "$PKG/storage/ExternalStorageHelper.kt"

          # TEAM 3: Repositories
          touch "$PKG/repository/MediaRepository.kt"
          touch "$PKG/repository/PlaylistRepository.kt"
          touch "$PKG/repository/FolderRepository.kt"
          touch "$PKG/repository/ResumeRepository.kt"

          # TEAM 3: Domain Models
          touch "$PKG/model/Video.kt"
          touch "$PKG/model/Folder.kt"
          touch "$PKG/model/Playlist.kt"
          touch "$PKG/model/PlaylistEntry.kt"
          touch "$PKG/model/ResumePoint.kt"

          # TEAM 4: ViewModels
          touch "$PKG/viewmodel/LibraryViewModel.kt"
          touch "$PKG/viewmodel/PlayerViewModel.kt"
          touch "$PKG/viewmodel/PlaylistDetailViewModel.kt"
          touch "$PKG/viewmodel/FolderVisibilityViewModel.kt"
          touch "$PKG/viewmodel/SubtitleOffsetViewModel.kt"
          touch "$PKG/viewmodel/SettingsViewModel.kt"

          # TEAM 4: Theme
          touch "$PKG/ui/theme/WatermelonPlayerTheme.kt"
          touch "$PKG/ui/theme/Color.kt"
          touch "$PKG/ui/theme/Type.kt"
          touch "$PKG/ui/theme/Shape.kt"
          touch "$PKG/ui/theme/Dimens.kt"

          # TEAM 4: Navigation
          touch "$PKG/ui/navigation/MainNavGraph.kt"
          touch "$PKG/ui/navigation/TvNavGraph.kt"
          touch "$PKG/ui/navigation/Route.kt"
          touch "$PKG/ui/navigation/NavTransitions.kt"

          # TEAM 4: Library Screen
          touch "$PKG/ui/screens/library/LibraryScreen.kt"
          touch "$PKG/ui/screens/library/LibraryTopBar.kt"
          touch "$PKG/ui/screens/library/VideoGridItem.kt"
          touch "$PKG/ui/screens/library/FolderChipRow.kt"
          touch "$PKG/ui/screens/library/LibraryEmptyState.kt"

          # TEAM 4: Player Screen
          touch "$PKG/ui/screens/player/PlayerScreen.kt"
          touch "$PKG/ui/screens/player/PlayerTopBar.kt"
          touch "$PKG/ui/screens/player/VideoSurface.kt"
          touch "$PKG/ui/screens/player/PlayerControlsOverlay.kt"
          touch "$PKG/ui/screens/player/SeekBar.kt"
          touch "$PKG/ui/screens/player/SubtitleOverlay.kt"
          touch "$PKG/ui/screens/player/VolumeGestureHandler.kt"
          touch "$PKG/ui/screens/player/BrightnessGestureHandler.kt"
          touch "$PKG/ui/screens/player/AudioTrackSelector.kt"
          touch "$PKG/ui/screens/player/SubtitleTrackSelector.kt"
          touch "$PKG/ui/screens/player/PlaybackSpeedController.kt"
          touch "$PKG/ui/screens/player/PlayerLockButton.kt"

          # TEAM 4: Playlist Screens
          touch "$PKG/ui/screens/playlist/PlaylistListScreen.kt"
          touch "$PKG/ui/screens/playlist/PlaylistDetailScreen.kt"
          touch "$PKG/ui/screens/playlist/CreatePlaylistDialog.kt"
          touch "$PKG/ui/screens/playlist/ReorderPlaylistDialog.kt"

          # TEAM 4: Folder Screens
          touch "$PKG/ui/screens/folders/FolderVisibilityScreen.kt"
          touch "$PKG/ui/screens/folders/FolderVisibilityItem.kt"

          # TEAM 4: Settings Screens
          touch "$PKG/ui/screens/settings/SettingsScreen.kt"
          touch "$PKG/ui/screens/settings/CodecSettings.kt"
          touch "$PKG/ui/screens/settings/AudioSettings.kt"
          touch "$PKG/ui/screens/settings/SubtitleSettings.kt"
          touch "$PKG/ui/screens/settings/NetworkSettings.kt"
          touch "$PKG/ui/screens/settings/AboutScreen.kt"

          # TEAM 4: Dialogs
          touch "$PKG/ui/screens/dialogs/SubtitleOffsetDialog.kt"
          touch "$PKG/ui/screens/dialogs/FilePickerDialog.kt"
          touch "$PKG/ui/screens/dialogs/DeleteConfirmDialog.kt"
          touch "$PKG/ui/screens/dialogs/ScanningProgressDialog.kt"

          # TEAM 4: Shared Components
          touch "$PKG/ui/components/TvFocusBorder.kt"
          touch "$PKG/ui/components/AspectRatioContainer.kt"
          touch "$PKG/ui/components/ShimmerPlaceholder.kt"
          touch "$PKG/ui/components/ErrorRetryView.kt"
          touch "$PKG/ui/components/AdaptiveGrid.kt"
          touch "$PKG/ui/components/PullToRefreshBox.kt"
          touch "$PKG/ui/components/MediaCard.kt"

          # TEAM 4: UI Utilities
          touch "$PKG/ui/util/TimeFormatter.kt"
          touch "$PKG/ui/util/FileSizeFormatter.kt"
          touch "$PKG/ui/util/DPadHelper.kt"
          touch "$PKG/ui/util/WindowSizeClass.kt"

          # ============================================================
          # RESOURCES — all skipped if already present
          # ============================================================
          RES="app/src/main/res"

          # Only create if dir doesn't exist
          [ -d "$RES" ] && echo "Resources dir exists — checking individual files..." || mkdir -p "$RES"

          # values/
          [ -d "$RES/values" ] || mkdir -p "$RES/values"
          for f in strings.xml strings-ar.xml colors.xml themes.xml dimens.xml; do
            [ -f "$RES/values/$f" ] || touch "$RES/values/$f"
          done

          # values-television/
          [ -d "$RES/values-television" ] || mkdir -p "$RES/values-television"
          [ -f "$RES/values-television/dimens.xml" ] || touch "$RES/values-television/dimens.xml"

          # drawable/
          [ -d "$RES/drawable" ] || mkdir -p "$RES/drawable"
          for f in ic_launcher_foreground.xml ic_player_play.xml ic_player_pause.xml \
                   ic_player_next.xml ic_player_previous.xml ic_subtitles.xml \
                   ic_playlist_add.xml ic_folder_hidden.xml ic_folder_visible.xml \
                   ic_settings.xml ic_watermelon_logo.xml; do
            [ -f "$RES/drawable/$f" ] || touch "$RES/drawable/$f"
          done

          # drawable-tv/
          [ -d "$RES/drawable-tv" ] || mkdir -p "$RES/drawable-tv"
          [ -f "$RES/drawable-tv/tv_banner.xml" ] || touch "$RES/drawable-tv/tv_banner.xml"

          # mipmap dirs
          for d in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi mipmap-anydpi-v26; do
            [ -d "$RES/$d" ] || mkdir -p "$RES/$d"
            [ -f "$RES/$d/ic_launcher.webp" ] && continue
            [ -f "$RES/$d/ic_launcher.xml" ] && continue
            # Create appropriate placeholder
            [[ "$d" == "mipmap-anydpi-v26" ]] && touch "$RES/$d/ic_launcher.xml" || touch "$RES/$d/ic_launcher.webp"
          done

          # xml/
          [ -d "$RES/xml" ] || mkdir -p "$RES/xml"
          for f in leanback_launcher.xml file_paths.xml network_security_config.xml; do
            [ -f "$RES/xml/$f" ] || touch "$RES/xml/$f"
          done

          # ============================================================
          # TEST DIRECTORIES
          # ============================================================
          TEST_PKG="app/src/test/kotlin/com/watermelon/player"
          mkdir -p "$TEST_PKG/rust"
          mkdir -p "$TEST_PKG/platform"
          mkdir -p "$TEST_PKG/repository"
          mkdir -p "$TEST_PKG/viewmodel"

          touch "$TEST_PKG/rust/WatermelonCoreTest.kt"
          touch "$TEST_PKG/platform/SurfaceProviderTest.kt"
          touch "$TEST_PKG/platform/NetworkSocketProviderTest.kt"
          touch "$TEST_PKG/platform/AudioFocusManagerTest.kt"
          touch "$TEST_PKG/platform/ThermalMonitorTest.kt"
          touch "$TEST_PKG/repository/MediaRepositoryTest.kt"
          touch "$TEST_PKG/repository/PlaylistRepositoryTest.kt"
          touch "$TEST_PKG/repository/FolderRepositoryTest.kt"
          touch "$TEST_PKG/viewmodel/LibraryViewModelTest.kt"
          touch "$TEST_PKG/viewmodel/PlayerViewModelTest.kt"
          touch "$TEST_PKG/viewmodel/FolderVisibilityViewModelTest.kt"

          ANDROID_TEST_PKG="app/src/androidTest/kotlin/com/watermelon/player"
          mkdir -p "$ANDROID_TEST_PKG/database"
          mkdir -p "$ANDROID_TEST_PKG/scan"
          mkdir -p "$ANDROID_TEST_PKG/storage"
          mkdir -p "$ANDROID_TEST_PKG/repository"
          mkdir -p "$ANDROID_TEST_PKG/ui"
          mkdir -p "$ANDROID_TEST_PKG/integration"

          touch "$ANDROID_TEST_PKG/database/VideoDaoTest.kt"
          touch "$ANDROID_TEST_PKG/database/FolderDaoTest.kt"
          touch "$ANDROID_TEST_PKG/database/PlaylistDaoTest.kt"
          touch "$ANDROID_TEST_PKG/database/MigrationTest.kt"
          touch "$ANDROID_TEST_PKG/scan/VideoScannerTest.kt"
          touch "$ANDROID_TEST_PKG/storage/UnifiedStorageAccessTest.kt"
          touch "$ANDROID_TEST_PKG/repository/MediaRepositoryInstrumentedTest.kt"
          touch "$ANDROID_TEST_PKG/repository/PlaylistRepositoryInstrumentedTest.kt"
          touch "$ANDROID_TEST_PKG/ui/LibraryScreenTest.kt"
          touch "$ANDROID_TEST_PKG/ui/PlayerScreenTest.kt"
          touch "$ANDROID_TEST_PKG/ui/FolderVisibilityScreenTest.kt"
          touch "$ANDROID_TEST_PKG/ui/SettingsScreenTest.kt"
          touch "$ANDROID_TEST_PKG/ui/TvNavigationTest.kt"
          touch "$ANDROID_TEST_PKG/integration/PlaybackIntegrationTest.kt"
          touch "$ANDROID_TEST_PKG/integration/PlaylistIntegrationTest.kt"
          touch "$ANDROID_TEST_PKG/integration/FolderVisibilityIntegrationTest.kt"

          # ============================================================
          # DOCUMENTATION
          # ============================================================
          mkdir -p docs
          touch docs/architecture.md
          touch docs/interface-contracts.md
          touch docs/team-1-rust-engine.md
          touch docs/team-2-jni-bridge.md
          touch docs/team-3-storage.md
          touch docs/team-4-ui.md
          touch docs/testing-strategy.md
          touch docs/codec-plugin-sdk.md
          touch docs/release-checklist.md

          # ============================================================
          # DONE
          # ============================================================
          echo ""
          echo "====================================="
          echo "  Project structure scaffolded!"
          echo "====================================="
          echo "  All files in app/src/main/res/ were left untouched"
          echo ""

      - name: Show created structure
        run: find . -type f -o -type d | sort | head -300

      - name: Verify no overwrite of existing res files
        run: |
          echo "Checking app/src/main/res/ integrity..."
          find app/src/main/res/ -type f | sort
          - name: Commit and push placeholder files
          run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Scaffold project structure" || echo "No changes to commit"
          git push
