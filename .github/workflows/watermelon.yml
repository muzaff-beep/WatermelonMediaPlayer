name: Watermelon CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Copy APK to stable location
        run: cp app/build/outputs/apk/debug/app-debug.apk app/Watermelon-debug.apk

      - name: Commit and push debug APK (main branch pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git stash push --include-untracked -m "auto-stash"
          git pull --rebase origin main

          git stash pop

          git add app/Watermelon-debug.apk
          if ! git diff --staged --quiet; then
            git commit -m "Auto-commit debug APK [skip ci]"
            git push
          fi

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermelon-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Optional release build – only runs if keystore secrets are set
      - name: Build release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ "$KEYSTORE_BASE64" != "" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks
            export KEYSTORE_PATH="$(pwd)/keystore.jks"
            ./gradlew assembleRelease
            echo "KEYSTORE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "No keystore secrets. Skipping release APK."
            echo "KEYSTORE_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Upload release APK artifact
        if: env.KEYSTORE_EXISTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: watermelon-release
          path: app/build/outputs/apk/release/app-release.apk